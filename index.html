<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Регистрация</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f3;
      font-family: -apple-system, sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
    p { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a7cf7; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status { margin-top: 14px; font-size: 13px; color: #666; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Перед началом</h1>
  <p>Укажите номер проекта, чтобы мы знали, кто прошёл опрос. После этого вы будете автоматически перенаправлены.</p>
  <label for="name">Ваше имя и фамилия</label>
  <input type="text" id="name" placeholder="Иван Иванов" autocomplete="name">
  <button id="btn" onclick="submit()">Перейти к опросу →</button>
  <div class="status" id="status"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzU8VsofIe4sy3HZXpV0X2kzceqSKYuY1LyJ15aAWzg7AwBBttvzE2imQXK3ZHvQ9zw/exec';
  const SURVEY_URL = 'тут будет ссылка для опроса';

  async function submit() {
    const name = document.getElementById('name').value.trim();
    if (!name) {
      document.getElementById('status').textContent = 'Пожалуйста, введите ваше имя.';
      return;
    }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    document.getElementById('status').textContent = 'Сохраняем данные...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ name }),
        headers: { 'Content-Type': 'text/plain' }
      });
    } catch (e) {}

    document.getElementById('status').textContent = 'Переходим к опросу...';
    setTimeout(() => { window.location.href = SURVEY_URL; }, 800);
  }

  document.getElementById('name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submit();
  });
</script>
</body>
</html>
